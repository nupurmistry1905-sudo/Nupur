<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Chess Engine</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2f3542;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            margin-bottom: 5px;
        }

        #status {
            font-size: 1.2rem;
            margin-bottom: 15px;
            font-weight: bold;
            color: #f1f2f6;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 70px);
            grid-template-rows: repeat(8, 70px);
            border: 4px solid #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .square {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }

        .white-sq { background-color: #eeeed2; }
        .black-sq { background-color: #769656; }

        .selected {
            background-color: #baca44 !important;
        }

        .valid-move {
            position: relative;
        }
        .valid-move::after {
            content: '';
            width: 20px;
            height: 20px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            position: absolute;
        }
    </style>
</head>
<body>

    <h1>HTML5 / JS Chess</h1>
    <div id="status">White's Turn</div>
    <div id="board"></div>

    <script>
        // Unicode symbols for chess pieces
        const pieces = {
            'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
            'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙',
            '.': ''
        };

        // Initial board setup layout
        let boardState = [
            ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
            ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
            ['.', '.', '.', '.', '.', '.', '.', '.'],
            ['.', '.', '.', '.', '.', '.', '.', '.'],
            ['.', '.', '.', '.', '.', '.', '.', '.'],
            ['.', '.', '.', '.', '.', '.', '.', '.'],
            ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
            ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
        ];

        let isWhiteTurn = true;
        let selectedSquare = null;
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');

        // Create and render the board grid
        function createBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    square.classList.add('square');
                    square.classList.add((r + c) % 2 === 0 ? 'white-sq' : 'black-sq');
                    square.dataset.row = r;
                    square.dataset.col = c;
                    
                    const piece = boardState[r][c];
                    square.innerHTML = pieces[piece];
                    
                    square.addEventListener('click', () => handleSquareClick(r, c));
                    boardElement.appendChild(square);
                }
            }
        }

        function handleSquareClick(r, c) {
            const piece = boardState[r][c];
            const isPieceWhite = piece === piece.toUpperCase() && piece !== '.';

            if (selectedSquare) {
                // If clicking the same square, deselect it
                if (selectedSquare.r === r && selectedSquare.c === c) {
                    clearHighlights();
                    selectedSquare = null;
                    return;
                }

                // If moving to an eligible spot
                if (validateMove(selectedSquare.r, selectedSquare.c, r, c)) {
                    boardState[r][c] = boardState[selectedSquare.r][selectedSquare.c];
                    boardState[selectedSquare.r][selectedSquare.c] = '.';
                    isWhiteTurn = !isWhiteTurn;
                    statusElement.innerText = isWhiteTurn ? "White's Turn" : "Black's Turn";
                    selectedSquare = null;
                    clearHighlights();
                    createBoard();
                    return;
                }
            }

            // Select a piece belonging to the active player
            if (piece !== '.' && ((isWhiteTurn && isPieceWhite) || (!isWhiteTurn && !isPieceWhite))) {
                clearHighlights();
                selectedSquare = { r, c };
                getSquareElement(r, c).classList.add('selected');
                showValidMoves(r, c);
            }
        }

        function getSquareElement(r, c) {
            return boardElement.children[r * 8 + c];
        }

        function clearHighlights() {
            const squares = document.querySelectorAll('.square');
            squares.forEach(sq => {
                sq.classList.remove('selected');
                sq.classList.remove('valid-move');
            });
        }

        function showValidMoves(fromR, fromC) {
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (validateMove(fromR, fromC, r, c)) {
                        getSquareElement(r, c).classList.add('valid-move');
                    }
                }
            }
        }

        // Logical validation for chess rules
        function validateMove(fromR, fromC, toR, toC) {
            const piece = boardState[fromR][fromC];
            const target = boardState[toR][toC];
            const type = piece.toLowerCase();

            // Guard rails: Cannot land on friendly piece
            if (target !== '.') {
                const isTargetWhite = target === target.toUpperCase();
                if (isWhiteTurn === isTargetWhite) return false;
            }

            const dR = toR - fromR;
            const dC = toC - fromC;
            const absR = Math.abs(dR);
            const absC = Math.abs(dC);

            switch (type) {
                case 'p': // Pawn Engine
                    const dir = (piece === 'P') ? -1 : 1;
                    const startRow = (piece === 'P') ? 6 : 1;
                    
                    if (dC === 0 && dR === dir && target === '.') return true;
                    if (dC === 0 && dR === 2 * dir && fromR === startRow && target === '.' && boardState[fromR + dir][fromC] === '.') return true;
                    if (absC === 1 && dR === dir && target !== '.') return true;
                    return false;

                case 'r': // Rook Engine
                    if (dR !== 0 && dC !== 0) return false;
                    return checkPathClear(fromR, fromC, toR, toC, dR, dC);

                case 'n': // Knight Engine
                    return (absR === 2 && absC === 1) || (absR === 1 && absC === 2);

                case 'b': // Bishop Engine
                    if (absR !== absC) return false;
                    return checkPathClear(fromR, fromC, toR, toC, dR, dC);

                case 'q': // Queen Engine
                    if (dR !== 0 && dC !== 0 && absR !== absC) return false;
                    return checkPathClear(fromR, fromC, toR, toC, dR, dC);

                case 'k': // King Engine
                    return absR <= 1 && absC <= 1;
            }
            return false;
        }

        // Raycast checker to avoid pieces stepping over each other
        function checkPathClear(fromR, fromC, toR, toC, dR, dC) {
            const stepR = dR === 0 ? 0 : dR / Math.abs(dR);
            const stepC = dC === 0 ? 0 : dC / Math.abs(dC);
            let currR = fromR + stepR;
            let currC = fromC + stepC;

            while (currR !== toR || currC !== toC) {
                if (boardState[currR][currC] !== '.') return false;
                currR += stepR;
                currC += stepC;
            }
            return true;
        }

        // Initialization
        createBoard();
    </script>
</body>
</html>
